<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" type="text/css" href="style.css" />
        <script src="script.js" defer></script>
        <title>Tic Tac Toe</title>
    </head>
    <body>
        <main class="content">
            <div class="heading-container">
                <h2>Tic Tac Toe</h2>
            </div>
            <div class="status-container">
                <h3 id="status">Click new game to start or restart game!</h3>
            </div>
            <div id="grid" class="grid-container">
                <div
                    class="grid-item"
                    id="item1"
                    onclick="game.getInput(0, 0)"
                ></div>
                <div
                    class="grid-item"
                    id="item2"
                    onclick="game.getInput(0, 1)"
                ></div>
                <div
                    class="grid-item"
                    id="item3"
                    onclick="game.getInput(0, 2)"
                ></div>
                <div
                    class="grid-item"
                    id="item4"
                    onclick="game.getInput(1, 0)"
                ></div>
                <div
                    class="grid-item"
                    id="item5"
                    onclick="game.getInput(1, 1)"
                ></div>
                <div
                    class="grid-item"
                    id="item6"
                    onclick="game.getInput(1, 2)"
                ></div>
                <div
                    class="grid-item"
                    id="item7"
                    onclick="game.getInput(2, 0)"
                ></div>
                <div
                    class="grid-item"
                    id="item8"
                    onclick="game.getInput(2, 1)"
                ></div>
                <div
                    class="grid-item"
                    id="item9"
                    onclick="game.getInput(2, 2)"
                ></div>
            </div>
            <div class="btn-container">
                <button onclick="game.init()" class="new-game-btn">
                    New Game
                </button>
            </div>
            <div id="name-form" class="hidden">
                <h3>Enter player names</h3>
                <label for="#name1">Player 1</label>
                <input id="name1" type="text" />
                <label for="#name2">Player 2</label>
                <input id="name2" type="text" />
                <button
                    onclick="displayController.setPlayerNames()"
                    id="submit"
                    type="button"
                >
                    Submit
                </button>
            </div>
        </main>
    </body>
    <footer>
        <div id="copywright">&copy;Justin Layton 2021</div>
        <div class="icons">
            <a id="github" href="https://github.com/Jreayl"
                ><img id="github-logo" src="icons/github-logo.svg"
            /></a>
            <a id="github" href="https://www.linkedin.com/in/justin-r-layton">
                <img id="linkedin-logo" src="icons/linkedin-logo.svg" />
            </a>
        </div>
    </footer>
</html>
